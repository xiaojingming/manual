server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 兼容旧路径: 将非 plugin/cli 的文档路径重定向到 plugin 下
    # 例如: /deployment/xxx -> /plugin/deployment/xxx
    location ~ ^/(deployment|guide|billing|policy|FAQ|best-practices|product-features|version-notes|tutorial-videos|category)(/.*)?$ {
        return 301 /plugin$request_uri;
    }

    # plugin 文档路由：SPA try_files 兜底，禁止 Nginx 自动追加尾斜杠
    location /plugin/ {
        try_files $uri $uri/index.html /plugin/index.html;
    }

    # cli 文档路由：SPA try_files 兜底
    location /cli/ {
        try_files $uri $uri/index.html /cli/index.html;
    }

    # 根路径兜底
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    server_tokens off;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    gzip_disable "MSIE [1-6]\.(?!.*SV1)";
}